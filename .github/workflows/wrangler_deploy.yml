# $schema: https://json.schemastore.org/github-workflow.json

name: "_ Wrangler Deploy _"

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Set short git commit SHA
        id: commit-id
        run: echo "val=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Download builds
        uses: actions/download-artifact@v8
        with:
          name: build-${{ steps.commit-id.outputs.val }}
          path: apps/web/build/

      - name: Trim sourcemaps
        run: find apps/web/build/ -type f -name "*.map" -delete

      - name: Upload to CDN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm dlx wrangler pages deploy ./apps/web/build/ --project-name=web-vault
